<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1420" viewBox="0 0 2200 1420" role="img" aria-labelledby="title desc">
  <title id="title">Akhila and Akshay Wedding Platform — Detailed Architecture</title>
  <desc id="desc">Detailed architecture showing dashboard APIs, RSVP APIs, data families in Vercel KV, signed links and confirmation providers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff9ed"/><stop offset="1" stop-color="#f0e5d1"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#3c2a16" flood-opacity=".14"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#6a5a46"/></marker>
    <style>
      .title{font:700 43px Georgia,serif;fill:#291508}.subtitle{font:400 19px Arial,sans-serif;fill:#705843}.lane{font:700 16px Arial,sans-serif;letter-spacing:2px;fill:#745a34}.label{font:700 18px Arial,sans-serif;fill:#291508}.small{font:400 14px Arial,sans-serif;fill:#705843}.micro{font:400 12px Arial,sans-serif;fill:#705843}.node{fill:#fffdf7;stroke:#d8b779;stroke-width:2}.store{fill:#eef7f1;stroke:#5b9872;stroke-width:2}.external{fill:#f8f4ff;stroke:#b8a2d1;stroke-width:2}.edge{stroke:#6a5a46;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#9d7654;stroke-width:3;stroke-dasharray:9 7;fill:none;marker-end:url(#arrow)}.edge-label{font:600 13px Arial,sans-serif;fill:#5c4630}
    </style>
  </defs>
  <rect width="2200" height="1420" fill="url(#bg)"/>
  <text x="70" y="72" class="title">Akhila &amp; Akshay Wedding Platform</text><text x="70" y="105" class="subtitle">Detailed request and data architecture — the implementation behind the dashboard and RSVP flow</text>
  <g opacity=".65"><rect x="45" y="145" width="285" height="1170" rx="25" fill="#fff5df"/><rect x="360" y="145" width="285" height="1170" rx="25" fill="#f6f1ea"/><rect x="675" y="145" width="670" height="1170" rx="25" fill="#fff5df"/><rect x="1375" y="145" width="355" height="1170" rx="25" fill="#eff7f2"/><rect x="1760" y="145" width="395" height="1170" rx="25" fill="#f6f0fb"/></g>
  <text x="68" y="182" class="lane">CLIENTS</text><text x="385" y="182" class="lane">VERCEL ROUTING</text><text x="700" y="182" class="lane">SERVERLESS API COMPONENTS</text><text x="1400" y="182" class="lane">SHARED VER CEL KV</text><text x="1785" y="182" class="lane">CONFIGURATION &amp; PROVIDERS</text>
  <!-- clients -->
  <g filter="url(#shadow)"><rect x="75" y="315" width="225" height="140" rx="18" class="node"/><circle cx="118" cy="365" r="24" fill="#1a3a52"/><path d="M106 365h24M112 354v22M124 354v22" stroke="#fff" stroke-width="3"/><text x="157" y="357" class="label">Dashboard Browser</text><text x="157" y="383" class="small">Admin / planner / viewer</text><text x="98" y="425" class="micro">Polling sync every 5 seconds</text></g>
  <g filter="url(#shadow)"><rect x="75" y="800" width="225" height="140" rx="18" class="node"/><circle cx="118" cy="850" r="24" fill="#9f1d22"/><path d="M106 842h24v18h-24zM106 842l12 10 12-10" stroke="#fff" stroke-width="2" fill="none"/><text x="157" y="842" class="label">Guest RSVP Browser</text><text x="157" y="868" class="small">Invited link or public RSVP</text><text x="98" y="910" class="micro">Name, phone, email, events, meals</text></g>
  <!-- Vercel -->
  <g filter="url(#shadow)"><rect x="390" y="315" width="225" height="140" rx="18" class="node" fill="#f7f7f7"/><path d="M422 346l25 43h-50z" fill="#050505"/><text x="470" y="355" class="label">Wedding Planning</text><text x="470" y="380" class="label">Vercel Project</text><text x="415" y="425" class="micro">Dashboard pages + /api routes</text></g>
  <g filter="url(#shadow)"><rect x="390" y="800" width="225" height="140" rx="18" class="node" fill="#f7f7f7"/><path d="M422 831l25 43h-50z" fill="#050505"/><text x="470" y="840" class="label">Standalone RSVP</text><text x="470" y="865" class="label">Vercel Project</text><text x="415" y="910" class="micro">RSVP page + /api/rsvp</text></g>
  <!-- services -->
  <g filter="url(#shadow)"><rect x="710" y="245" width="270" height="170" rx="18" class="node"/><rect x="732" y="267" width="42" height="34" rx="7" fill="#1a3a52"/><path d="M741 284h24M749 274v20M758 274v20" stroke="#f8d680" stroke-width="3"/><text x="793" y="286" class="label">Auth API</text><text x="732" y="332" class="small">login • signup • invitations</text><text x="732" y="357" class="small">JWT roles: admin / planner / viewer</text><text x="732" y="382" class="micro">api/auth.js + lib/jwt.js</text></g>
  <g filter="url(#shadow)"><rect x="1025" y="235" width="280" height="190" rx="18" class="node"/><rect x="1048" y="260" width="42" height="34" rx="7" fill="#1a3a52"/><path d="M1057 277h24M1065 267v20M1074 267v20" stroke="#f8d680" stroke-width="3"/><text x="1107" y="278" class="label">Planning APIs</text><text x="1048" y="322" class="small">tasks • budget • vendors • venues</text><text x="1048" y="347" class="small">food/menu • timeline • wedding config</text><text x="1048" y="372" class="micro">CRUD and budget CSV export</text><text x="1048" y="397" class="micro">api/{tasks,budget,vendors,venues,food,timeline,wedding}.js</text></g>
  <g filter="url(#shadow)"><rect x="710" y="560" width="270" height="210" rx="18" class="node"/><rect x="732" y="584" width="42" height="34" rx="7" fill="#1a3a52"/><path d="M741 601h24M749 591v20M758 591v20" stroke="#f8d680" stroke-width="3"/><text x="793" y="603" class="label">Guest API</text><text x="732" y="648" class="small">guest CRUD • CSV import/export</text><text x="732" y="673" class="small">RSVP summary • reset • bulk invite</text><text x="732" y="698" class="small">Creates signed RSVP links</text><text x="732" y="733" class="micro">api/guests.js + lib/rsvp.js</text></g>
  <g filter="url(#shadow)"><rect x="1025" y="665" width="280" height="245" rx="18" class="node"/><rect x="1048" y="690" width="42" height="34" rx="7" fill="#9f1d22"/><path d="M1058 707h22M1069 696v22" stroke="#fff4d4" stroke-width="3"/><text x="1107" y="708" class="label">RSVP API</text><text x="1048" y="753" class="small">Verifies HMAC RSVP token</text><text x="1048" y="778" class="small">Validates events, attendance and meals</text><text x="1048" y="803" class="small">Locks submitted RSVP</text><text x="1048" y="828" class="small">Builds calendar .ics file</text><text x="1048" y="853" class="small">Stores confirmation delivery result</text><text x="1048" y="886" class="micro">api/rsvp.js + lib/rsvp*.js</text></g>
  <!-- storage -->
  <g filter="url(#shadow)"><path d="M1430 318c0-22 56-40 122-40s122 18 122 40v120c0 22-56 40-122 40s-122-18-122-40z" class="store"/><ellipse cx="1552" cy="318" rx="122" ry="40" class="store"/><path d="M1430 318v120c0 22 56 40 122 40s122-18 122-40V318" fill="none" stroke="#5b9872" stroke-width="2"/><text x="1552" y="375" text-anchor="middle" class="label">Identity &amp; configuration</text><text x="1552" y="401" text-anchor="middle" class="small">users • invites • wedding config</text><text x="1552" y="429" text-anchor="middle" class="micro">wedding:{id}, user:{email}</text></g>
  <g filter="url(#shadow)"><path d="M1430 725c0-22 56-40 122-40s122 18 122 40v156c0 22-56 40-122 40s-122-18-122-40z" class="store"/><ellipse cx="1552" cy="725" rx="122" ry="40" class="store"/><path d="M1430 725v156c0 22 56 40 122 40s122-18 122-40V725" fill="none" stroke="#5b9872" stroke-width="2"/><text x="1552" y="780" text-anchor="middle" class="label">Planning &amp; RSVP data</text><text x="1552" y="808" text-anchor="middle" class="small">guests + RSVP responses + delivery status</text><text x="1552" y="833" text-anchor="middle" class="small">tasks • budget • vendors • venues</text><text x="1552" y="858" text-anchor="middle" class="small">food • timeline</text><text x="1552" y="888" text-anchor="middle" class="micro">JSON values through Upstash REST pipeline</text></g>
  <!-- external -->
  <g filter="url(#shadow)"><rect x="1800" y="245" width="315" height="155" rx="18" class="external"/><path d="M1828 278l21 36h-42z" fill="#050505"/><text x="1872" y="285" class="label">Vercel Environment Variables</text><text x="1828" y="330" class="small">JWT / RSVP signing secrets</text><text x="1828" y="354" class="small">KV REST URL + token</text><text x="1828" y="378" class="small">Gmail and Twilio credentials</text></g>
  <g filter="url(#shadow)"><rect x="1800" y="510" width="315" height="130" rx="18" class="external"/><path d="M1828 548l18-16 18 16v34h-36z" fill="#ea4335"/><path d="M1828 548l18 16 18-16" stroke="#fff" stroke-width="4" fill="none"/><text x="1890" y="558" class="label">Google OAuth + Gmail API</text><text x="1828" y="604" class="small">Refreshes access token, then sends</text><text x="1828" y="626" class="small">RSVP confirmation email</text></g>
  <g filter="url(#shadow)"><rect x="1800" y="750" width="315" height="130" rx="18" class="external"/><circle cx="1847" cy="807" r="24" fill="#e72b30"/><circle cx="1838" cy="798" r="5" fill="#fff"/><circle cx="1856" cy="798" r="5" fill="#fff"/><circle cx="1838" cy="816" r="5" fill="#fff"/><circle cx="1856" cy="816" r="5" fill="#fff"/><text x="1890" y="800" class="label">Twilio Messages API</text><text x="1828" y="847" class="small">Sends RSVP confirmation SMS</text></g>
  <g filter="url(#shadow)"><rect x="1800" y="1015" width="315" height="130" rx="18" class="external"/><rect x="1828" y="1051" width="38" height="31" rx="5" fill="#111"/><path d="M1835 1057l12 10 12-10" stroke="#fff" stroke-width="2" fill="none"/><text x="1890" y="1066" class="label">Resend API</text><text x="1828" y="1112" class="small">Dashboard bulk RSVP invitations</text></g>
  <!-- connectors -->
  <path d="M300 385H390" class="edge"/><text x="321" y="368" class="edge-label">HTTPS</text>
  <path d="M300 870H390" class="edge"/><text x="321" y="853" class="edge-label">HTTPS</text>
  <path d="M615 365H710" class="edge"/><text x="635" y="347" class="edge-label">/api/auth</text>
  <path d="M615 405C760 405 875 335 1025 335" class="edge"/><text x="770" y="425" class="edge-label">planning routes</text>
  <path d="M615 440C650 440 675 640 710 640" class="edge"/><text x="628" y="555" class="edge-label">/api/guests</text>
  <path d="M615 870H1025" class="edge"/><text x="755" y="852" class="edge-label">/api/rsvp</text>
  <path d="M980 330H1430" class="edge"/><text x="1195" y="312" class="edge-label">users / config</text>
  <path d="M1305 330C1370 330 1360 390 1430 390" class="edge"/><text x="1328" y="368" class="edge-label">configuration</text>
  <path d="M980 665H1430" class="edge"/><text x="1182" y="648" class="edge-label">guests / RSVP</text>
  <path d="M1305 790H1430" class="edge"/><text x="1322" y="772" class="edge-label">write RSVP + status</text>
  <path d="M980 385C1260 385 1420 245 1800 310" class="dash"/><text x="1332" y="267" class="edge-label">JWT + KV configuration</text>
  <path d="M1305 735C1480 735 1555 335 1800 335" class="dash"/><text x="1472" y="496" class="edge-label">provider credentials</text>
  <path d="M1305 755C1500 755 1610 575 1800 575" class="dash"/><text x="1470" y="690" class="edge-label">email confirmation</text>
  <path d="M1305 820C1510 820 1600 815 1800 815" class="dash"/><text x="1465" y="802" class="edge-label">SMS confirmation</text>
  <path d="M980 710C1350 710 1510 1080 1800 1080" class="dash"/><text x="1372" y="1040" class="edge-label">bulk invitation email</text>
  <text x="70" y="1370" class="small">RSVP confirmation is a post-save action: the guest record is saved and locked first, then Gmail and Twilio delivery outcomes are written back to the same guest record.</text>
</svg>
