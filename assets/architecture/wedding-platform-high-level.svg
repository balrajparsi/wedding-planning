<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">Akhila and Akshay Wedding Platform — High-Level Architecture</title>
  <desc id="desc">High-level architecture for the wedding planning dashboard and public RSVP website, deployed on Vercel with shared Vercel KV storage, Gmail, Twilio, and Resend.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff9ec"/><stop offset="1" stop-color="#f4ead6"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#3c2a16" flood-opacity=".14"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#6a5a46"/></marker>
    <style>
      .title{font:700 42px Georgia,serif;fill:#291508}.subtitle{font:400 19px Arial,sans-serif;fill:#705843}.lane{font:700 17px Arial,sans-serif;letter-spacing:2px;fill:#745a34}.label{font:700 20px Arial,sans-serif;fill:#291508}.small{font:400 15px Arial,sans-serif;fill:#705843}.edge{stroke:#6a5a46;stroke-width:3;fill:none;marker-end:url(#arrow)}.edge-dash{stroke:#9d7654;stroke-width:3;fill:none;stroke-dasharray:9 7;marker-end:url(#arrow)}.edge-label{font:600 14px Arial,sans-serif;fill:#5c4630}.node{stroke:#d8b779;stroke-width:2}.white{fill:#fffdf7}.external{fill:#f8f4ff;stroke:#b8a2d1;stroke-width:2}.storage{fill:#eef7f1;stroke:#5b9872;stroke-width:2}.vercel{fill:#f4f4f4;stroke:#585858;stroke-width:2}
    </style>
  </defs>
  <rect width="1800" height="1080" fill="url(#bg)"/>
  <text x="80" y="82" class="title">Akhila &amp; Akshay Wedding Platform</text>
  <text x="80" y="116" class="subtitle">High-level architecture — wedding planning dashboard, guest RSVP journey, shared storage, and confirmation delivery</text>

  <g opacity=".65"><rect x="58" y="160" width="330" height="810" rx="24" fill="#fff5df"/><rect x="425" y="160" width="310" height="810" rx="24" fill="#f6f1ea"/><rect x="770" y="160" width="340" height="810" rx="24" fill="#fff5df"/><rect x="1145" y="160" width="270" height="810" rx="24" fill="#eff7f2"/><rect x="1450" y="160" width="290" height="810" rx="24" fill="#f6f0fb"/></g>
  <text x="82" y="199" class="lane">PEOPLE &amp; BROWSERS</text><text x="449" y="199" class="lane">VERCEL PROJECTS</text><text x="794" y="199" class="lane">SERVERLESS SERVICES</text><text x="1169" y="199" class="lane">PERSISTENT STORAGE</text><text x="1474" y="199" class="lane">EXTERNAL PROVIDERS</text>

  <!-- client nodes -->
  <g filter="url(#shadow)"><rect x="92" y="320" width="260" height="150" rx="18" class="node white"/><circle cx="137" cy="375" r="27" fill="#1a3a52"/><path d="M124 377h26M132 365v24M132 365l5-6 5 6" stroke="#fff" stroke-width="3" fill="none"/><text x="178" y="365" class="label">Wedding Planning</text><text x="178" y="392" class="label">Dashboard</text><text x="178" y="421" class="small">Admin • Planner • Viewer</text></g>
  <g filter="url(#shadow)"><rect x="92" y="625" width="260" height="150" rx="18" class="node white"/><circle cx="137" cy="680" r="27" fill="#9f1d22"/><path d="M122 674h30v19h-30zM122 674l15 11 15-11" stroke="#fff" stroke-width="2" fill="none"/><text x="178" y="670" class="label">Public RSVP</text><text x="178" y="697" class="label">Website</text><text x="178" y="726" class="small">Guests submit attendance</text></g>

  <!-- vercel nodes -->
  <g filter="url(#shadow)"><rect x="455" y="320" width="250" height="150" rx="18" class="vercel"/><path d="M495 354l28 48h-56z" fill="#050505"/><text x="545" y="365" class="label">Wedding Planning</text><text x="545" y="392" class="label">Vercel Project</text><text x="495" y="429" class="small">Dashboard static site + API routes</text></g>
  <g filter="url(#shadow)"><rect x="455" y="625" width="250" height="150" rx="18" class="vercel"/><path d="M495 659l28 48h-56z" fill="#050505"/><text x="545" y="670" class="label">Standalone RSVP</text><text x="545" y="697" class="label">Vercel Project</text><text x="495" y="734" class="small">Public RSVP site + API route</text></g>

  <!-- service nodes -->
  <g filter="url(#shadow)"><rect x="805" y="290" width="270" height="195" rx="18" class="node white"/><rect x="828" y="315" width="54" height="38" rx="8" fill="#1a3a52"/><path d="M841 334h28M851 324v20M861 324v20" stroke="#f8d680" stroke-width="3"/><text x="905" y="335" class="label">Dashboard APIs</text><text x="828" y="384" class="small">Auth • guests • tasks • budget</text><text x="828" y="408" class="small">vendors • venues • food</text><text x="828" y="432" class="small">timeline • wedding configuration</text></g>
  <g filter="url(#shadow)"><rect x="805" y="610" width="270" height="205" rx="18" class="node white"/><rect x="828" y="635" width="54" height="38" rx="8" fill="#9f1d22"/><path d="M840 655h31M855 642v26" stroke="#fff4d4" stroke-width="3"/><text x="905" y="655" class="label">RSVP APIs</text><text x="828" y="704" class="small">Signed link validation • RSVP save</text><text x="828" y="728" class="small">Calendar .ics generation</text><text x="828" y="752" class="small">Email + SMS confirmations</text></g>

  <!-- storage cylinder -->
  <g filter="url(#shadow)"><path d="M1190 362c0-22 43-40 94-40s94 18 94 40v105c0 22-43 40-94 40s-94-18-94-40z" class="storage"/><ellipse cx="1284" cy="362" rx="94" ry="40" class="storage"/><path d="M1190 362v105c0 22 43 40 94 40s94-18 94-40V362" fill="none" stroke="#5b9872" stroke-width="2"/><text x="1284" y="418" text-anchor="middle" class="label">Vercel KV</text><text x="1284" y="445" text-anchor="middle" class="small">Upstash Redis REST</text><text x="1284" y="472" text-anchor="middle" class="small">shared data store</text></g>

  <!-- provider nodes -->
  <g filter="url(#shadow)"><rect x="1480" y="258" width="225" height="130" rx="18" class="external"/><path d="M1510 298l18-16 18 16v34h-36z" fill="#ea4335"/><path d="M1510 298l18 16 18-16" stroke="#fff" stroke-width="4" fill="none"/><text x="1562" y="307" class="label">Gmail API</text><text x="1510" y="352" class="small">OAuth refresh + email</text></g>
  <g filter="url(#shadow)"><rect x="1480" y="472" width="225" height="130" rx="18" class="external"/><circle cx="1528" cy="530" r="25" fill="#e72b30"/><circle cx="1518" cy="520" r="6" fill="#fff"/><circle cx="1538" cy="520" r="6" fill="#fff"/><circle cx="1518" cy="540" r="6" fill="#fff"/><circle cx="1538" cy="540" r="6" fill="#fff"/><text x="1568" y="520" class="label">Twilio API</text><text x="1510" y="566" class="small">RSVP SMS confirmation</text></g>
  <g filter="url(#shadow)"><rect x="1480" y="686" width="225" height="130" rx="18" class="external"/><rect x="1508" y="718" width="42" height="34" rx="5" fill="#111"/><path d="M1515 724l14 11 14-11" stroke="#fff" stroke-width="2" fill="none"/><text x="1570" y="732" class="label">Resend API</text><text x="1510" y="778" class="small">Dashboard invitation email</text></g>

  <!-- arrows -->
  <path d="M352 395H455" class="edge"/><text x="378" y="378" class="edge-label">HTTPS</text>
  <path d="M352 700H455" class="edge"/><text x="378" y="683" class="edge-label">HTTPS</text>
  <path d="M705 395H805" class="edge"/><text x="720" y="378" class="edge-label">routes</text>
  <path d="M705 700H805" class="edge"/><text x="720" y="683" class="edge-label">routes</text>
  <path d="M1075 390H1190" class="edge"/><text x="1093" y="373" class="edge-label">CRUD</text>
  <path d="M1075 712H1190" class="edge"/><text x="1085" y="695" class="edge-label">read / write</text>
  <path d="M1075 650C1225 650 1300 323 1480 323" class="edge-dash"/><text x="1220" y="570" class="edge-label">confirmation email</text>
  <path d="M1075 720C1230 720 1330 537 1480 537" class="edge-dash"/><text x="1215" y="749" class="edge-label">confirmation SMS</text>
  <path d="M1075 435C1240 435 1330 751 1480 751" class="edge-dash"/><text x="1228" y="468" class="edge-label">bulk invite email</text>
  <text x="80" y="1020" class="small">Solid arrows: application request and storage paths. Dashed arrows: secure outbound calls to delivery providers. Provider credentials are kept in Vercel environment variables.</text>
</svg>
